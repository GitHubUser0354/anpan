<div class="account-container">
    <div class="account-card">
        <h1 class="account-title">My Profile</h1>

        <div class="profile-pic"></div>

        <div class="info-section">
            <label>Full Name</label>
            <input type="text" name="name" value="John Doe" disabled />

            <label>Email</label>
            <input type="email" name="email" value="johndoe@example.com" disabled />

            <label>Phone Number</label>
            <input type="tel" name="phone" value="+63 912 345 6789" disabled />

            <label>Country</label>
            <select name="country" disabled>
                <option>Philippines</option>
                <option>Japan</option>
                <option>South Korea</option>
                <option>Thailand</option>
                <option>USA</option>
                <option>Canada</option>
            </select>

            <label>Bio</label>
            <textarea name="bio" disabled>Traveler. Dreamer. Food Explorer.</textarea>
        </div>

        <div class="button-group">
            <button class="edit-btn">Edit Profile</button>
            <button class="back-btn">← Back</button>
        </div>
    </div>
</div>
